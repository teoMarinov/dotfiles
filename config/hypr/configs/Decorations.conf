general {
  border_size = 1
  gaps_in = 3
  gaps_out = 5

  col.active_border = rgba(dddddd99) rgba(dddddd44) 90deg
  layout = dwindle
}

decoration {
  rounding = 3

  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0

  dim_inactive = false
  dim_strength = 0.1
  dim_special = 0.8

  shadow {
    enabled = true
    range = 30
    render_power = 10

    color = rgba(00000050)
  }


  blur {
    enabled = false
    size = 3
    passes = 2
    ignore_opacity = true
    new_optimizations = true
    special = true
    popups = true
  }
}
