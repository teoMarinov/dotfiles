# в–Ҳв–Җв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җ
# в–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–Җв–‘вҖғв–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Җв–„вҖғв–„в–Ҳ 

$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

source= Defaults.conf

# в–Ҳв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–ҖвҖғв–Җв–Ҳв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„в–Җв–Ҳ
# в–„в–ҲвҖғв–‘в–Ҳв–‘вҖғв–„в–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–‘в–Җв–‘в–Ҳ

bind = $mainMod CTRL, Return, exec, qs -c noctalia-shell ipc call launcher toggle
bind = $mainMod, B, exec, xdg-open "https://"
bind = $mainMod CTRL, TAB, exec, $scriptsDir/OverviewToggle.sh
bind = $mainMod, Return, exec, $term
bind = $mainMod, Z, exec, $term
bind = $mainMod SHIFT, Z, exec, $term --class floating_shell
bind = $mainMod, E, exec, $scriptsDir/RaiseNautilus.sh

# FEATURES / EXTRAS
bind = $mainMod SHIFT, E, exec, $scriptsDir/RofiEmoji.sh
bind = $mainMod CTRL, S, exec, rofi -show window
bind = $mainMod, V, exec, $scriptsDir/ClipManager.sh
bind = $mainMod CTRL, R, exec, $scriptsDir/RofiThemeSelector.sh

bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, fullscreen, 1 # maximize window
bind = $mainMod, SPACE, togglefloating
bind = $mainMod ALT, SPACE, exec, hyprctl dispatch workspaceopt allfloat
bind = $mainMod SHIFT, Return, exec, $scriptsDir/Dropterminal.sh $term

# Desktop zooming
bind = $mainMod ALT, mouse_down, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
bind = $mainMod ALT, mouse_up, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')" 

bind = SHIFT_L, ALT_L, exec, $scriptsDir/SwitchKeyboardLayout.sh

#### SYSTEM ####
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, $scriptsDir/KillActiveProcess.sh

# # Layouts (Dwindle/Master)
# bind = $mainMod SHIFT, I, togglesplit
# bind = $mainMod, P, pseudo
# bind = $mainMod CTRL, J, togglesplit
# bind = $mainMod CTRL, K, swapsplit
# bind = $mainMod, M, exec, hyprctl dispatch splitratio 0.3

# Cycle windows
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop

# Media & Volume (Repeatable)
binde = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc
binde = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec
bind = , xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic
bind = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle
bind = , xf86Sleep, exec, systemctl suspend

bind = , xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause
bind = , xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause
bind = , xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause
bind = , xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt
bind = , xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv
bind = , xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop

# Screenshots
bind = $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --area
bind = $mainMod CTRL, Print, exec, $scriptsDir/ScreenShot.sh --now
bind = $mainMod SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --active
bind = , Print, exec, $scriptsDir/ScreenShot.sh --swappy

# в–Ҳв–„в–‘в–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–„в–Җв–ҲвҖғв–Җв–Ҳв–ҖвҖғв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–‘в–Ҳ
# в–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–‘в–Ҳв–‘вҖғв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–Ҳ

# Focus Movement (Arrows + HJKL)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move Window (Arrows + HJKL)
bind = $mainMod ALT, left, movewindow, l
bind = $mainMod ALT, right, movewindow, r
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, down, movewindow, d
bind = $mainMod ALT, H, movewindow, l
bind = $mainMod ALT, L, movewindow, r
bind = $mainMod ALT, K, movewindow, u
bind = $mainMod ALT, J, movewindow, d

# Resize Window (Repeatable Arrows + HJKL)
binde = $mainMod SHIFT, left, resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive, 50 0
binde = $mainMod SHIFT, up, resizeactive, 0 -50
binde = $mainMod SHIFT, down, resizeactive, 0 50
binde = $mainMod SHIFT, H, resizeactive, -50 0
binde = $mainMod SHIFT, L, resizeactive, 50 0
binde = $mainMod SHIFT, K, resizeactive, 0 -50
binde = $mainMod SHIFT, J, resizeactive, 0 50

# Move Floating (Repeatable Arrows + HJKL)
binde = $mainMod CTRL SHIFT, left, moveactive, -40 0
binde = $mainMod CTRL SHIFT, right, moveactive, 40 0
binde = $mainMod CTRL SHIFT, up, moveactive, 0 -40
binde = $mainMod CTRL SHIFT, down, moveactive, 0 40
binde = $mainMod CTRL SHIFT, H, moveactive, -40 0
binde = $mainMod CTRL SHIFT, L, moveactive, 40 0
binde = $mainMod CTRL SHIFT, K, moveactive, 0 -40
binde = $mainMod CTRL SHIFT, J, moveactive, 0 40

# Move Workspace to Monitor (Arrows + HJKL)
bind = $mainMod CTRL ALT, left, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL ALT, right, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL ALT, up, movecurrentworkspacetomonitor, u
bind = $mainMod CTRL ALT, down, movecurrentworkspacetomonitor, d
bind = $mainMod CTRL ALT, H, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL ALT, L, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL ALT, K, movecurrentworkspacetomonitor, u
bind = $mainMod CTRL ALT, J, movecurrentworkspacetomonitor, d

# в–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Җв–„в–Җв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–‘в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

# Switch Workspaces
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, grave, workspace, 10

# Move active window to workspace (Follow)
bind = $mainMod CTRL, code:10, movetoworkspace, 1
bind = $mainMod CTRL, code:11, movetoworkspace, 2
bind = $mainMod CTRL, code:12, movetoworkspace, 3
bind = $mainMod CTRL, code:13, movetoworkspace, 4
bind = $mainMod CTRL, code:14, movetoworkspace, 5
bind = $mainMod CTRL, code:15, movetoworkspace, 6
bind = $mainMod CTRL, code:16, movetoworkspace, 7
bind = $mainMod CTRL, code:17, movetoworkspace, 8
bind = $mainMod CTRL, code:18, movetoworkspace, 9
bind = $mainMod CTRL, grave, movetoworkspace, 10
bind = $mainMod CTRL, bracketleft, movetoworkspace, -1
bind = $mainMod CTRL, bracketright, movetoworkspace, +1

# Move active window to workspace (Silent)
bind = $mainMod SHIFT, code:10, movetoworkspacesilent, 1
bind = $mainMod SHIFT, code:11, movetoworkspacesilent, 2
bind = $mainMod SHIFT, code:12, movetoworkspacesilent, 3
bind = $mainMod SHIFT, code:13, movetoworkspacesilent, 4
bind = $mainMod SHIFT, code:14, movetoworkspacesilent, 5
bind = $mainMod SHIFT, code:15, movetoworkspacesilent, 6
bind = $mainMod SHIFT, code:16, movetoworkspacesilent, 7
bind = $mainMod SHIFT, code:17, movetoworkspacesilent, 8
bind = $mainMod SHIFT, code:18, movetoworkspacesilent, 9
bind = $mainMod SHIFT, grave, movetoworkspacesilent, 10
bind = $mainMod SHIFT, bracketleft, movetoworkspacesilent, -1
bind = $mainMod SHIFT, bracketright, movetoworkspacesilent, +1

# Special workspace
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod, U, togglespecialworkspace

# Workspace shelf
bind = $mainMod, S, exec, $scriptsDir/WorkspaceSwap.sh
bind = $mainMod SHIFT, S, exec, $scriptsDir/WorkspaceShelf.sh

# Navigation
bind = $mainMod, tab, workspace, m+1
bind = $mainMod SHIFT, tab, workspace, m-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1

# Mouse bind
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# в–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Җв–Ҳв–ҖвҖғв–„в–Җв–ҲвҖғв–Ҳв–‘в–‘вҖғв–ҲвҖғв–„в–Җв–Ҳ
# в–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–Җв–Ҳ

# Noctalia Specific IPC Calls
bind = $mainMod CTRL SHIFT, Q, exec, qs -c noctalia-shell ipc call sessionMenu toggle
bind = $mainMod CTRL SHIFT, L, exec, qs -c noctalia-shell ipc call lockScreen lock
bind = $mainMod CTRL SHIFT, S, exec, qs -c noctalia-shell ipc call settings toggle
bind = $mainMod ALT CTRL, C, exec, qs -c noctalia-shell ipc call controlCenter toggle
bind = $mainMod, W, exec, qs -c noctalia-shell ipc call wallpaper toggle
bind = CTRL ALT, W, exec, qs -c noctalia-shell ipc call wallpaper random
bind = $mainMod SHIFT, C, exec, qs -c noctalia-shell ipc call calendar toggle
bind = $mainMod, N, exec, qs -c noctalia-shell ipc call notifications toggleHistory
bind = $mainMod SHIFT, N, exec, qs -c noctalia-shell ipc call notifications removeOldestHistory
bind = $mainMod CTRL, N, exec, qs -c noctalia-shell ipc call notifications clear

# в–Ҳв–‘в–‘вҖғв–„в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–„в–„вҖғв–Ҳв–Җв–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘вҖғв–„в–Ҳ

# --- GROUPS (TABBED MODE) ---
# bind = $mainMod, G, togglegroup
# bindd = $mainMod, G, Toggle Group (Tabbed), togglegroup
# bind = $mainMod, Tab, changegroupactive, f
# bindd = $mainMod, Tab, Next Tab in Group, changegroupactive, f
# bind = $mainMod SHIFT, Tab, changegroupactive, b
# bindd = $mainMod SHIFT, Tab, Prev Tab in Group, changegroupactive, b
# bind = $mainMod CTRL, Tab, changegroupactive

# Move window into/out of group (Arrow keys + HJKL)
bind = $mainMod SHIFT, Tab, changegroupactive, b
bindd = $mainMod CTRL, H, Move out of group, moveoutofgroup
bindd = $mainMod CTRL, left, Move out of group, moveoutofgroup

bindd = $mainMod CTRL, L, Move into group (Right), moveintogroup, r
bindd = $mainMod CTRL, right, Move into group (Right), moveintogroup, r

# --- DWINDLE LAYOUT SPECIFIC ---
# Split direction
bindd = $mainMod SHIFT, I, Toggle Dwindle Split, togglesplit 
bindd = $mainMod, P, Toggle Pseudo-tiling, pseudo

# --- MASTER LAYOUT SPECIFIC ---
bindd = $mainMod, I, Add to Master area, layoutmsg, addmaster
bindd = $mainMod CTRL, D, Remove from Master area, layoutmsg, removemaster
bindd = $mainMod CTRL, Return, Swap with Master, layoutmsg, swapwithmaster

# Master Orientation (Change where the master sits)
bindd = $mainMod ALT, M, Master Orientation (Cycle), layoutmsg, orientationcycle

# --- APPS ---
bind = $mainMod, C, exec, gnome-calculator
bind = $mainMod, O, exec, obsidian
bind = $mainMod, D, exec, discord
bind = $mainMod, G, exec, steam
bind = $mainMod, I, exec, an-anime-game-launcher
bind = $mainMod, equal, exec, kate
